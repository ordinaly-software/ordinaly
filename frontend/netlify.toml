[[headers]]
for = "/_next/static/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/static/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/start.js"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://cdn.segment.com https://www.google.com https://www.gstatic.com https://www.recaptcha.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.ordinaly.ai https://www.google.com https://www.gstatic.com https://www.recaptcha.net https://*.sanity.io https://core.sanity-cdn.com; font-src 'self' https://fonts.gstatic.com; frame-src https://www.google.com https://www.gstatic.com https://www.recaptcha.net;"

[[headers]]
  for = "/auth/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/es/auth/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/en/auth/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*"
  conditions = {Host = ["odoo.ordinaly.ai", "n8n.ordinaly.ai", "mail.ordinaly.ai"]}
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[redirects]]
  from = "/*"
  to = "https://ordinaly.ai/:splat"
  status = 301
  force = true
  conditions = { Host = ["ordinaly.netlify.app", "orsinaly.netlify.app"] }

# Redirect old /services/[slug] paths to /[slug]
[[redirects]]
  from = "/services/:slug"
  to = "/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/es/services/:slug"
  to = "/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/en/services/:slug"
  to = "/en/:slug"
  status = 301
  force = true

# Move local landings out of /services/* to top-level paths (legacy redirects)
[[redirects]]
  from = "/es/chatbots-empresas-sevilla"
  to = "/chatbots-empresas-sevilla"
  status = 301
  force = true
